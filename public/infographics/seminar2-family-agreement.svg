<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="0" y="0" width="1200" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#2D3436" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 42px Georgia, serif; fill: #2D3436; }
      .subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #4A5568; }
      .center-title { font: 700 30px Georgia, serif; fill: white; }
      .center-copy { font: 400 18px Arial, Helvetica, sans-serif; fill: rgba(255,255,255,0.84); }
      .box-title { font: 700 21px Georgia, serif; fill: #2D3436; }
      .box-copy { font: 400 17px Arial, Helvetica, sans-serif; fill: #4A5568; }
      .source { font: 400 15px Arial, Helvetica, sans-serif; fill: #7A7A7A; }
    </style>
  </defs>

  <rect width="1200" height="820" rx="36" fill="#FAF8F5"/>
  <text x="72" y="84" class="title">Rodinná digitální dohoda</text>
  <text x="72" y="120" class="subtitle">Dohoda funguje, když je jasná, krátká, pravidelně obnovovaná a platí i pro rodiče.</text>

  <g stroke="#D9D1C6" stroke-width="4">
    <line x1="600" y1="402" x2="256" y2="232"/>
    <line x1="600" y1="402" x2="944" y2="232"/>
    <line x1="600" y1="402" x2="180" y2="402"/>
    <line x1="600" y1="402" x2="1020" y2="402"/>
    <line x1="600" y1="402" x2="320" y2="618"/>
    <line x1="600" y1="402" x2="880" y2="618"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="424" y="286" width="352" height="232" rx="34" fill="#5B7B6A"/>
    <rect x="88" y="150" width="310" height="150" rx="24" fill="white"/>
    <rect x="802" y="150" width="310" height="150" rx="24" fill="white"/>
    <rect x="72" y="328" width="310" height="150" rx="24" fill="white"/>
    <rect x="818" y="328" width="310" height="150" rx="24" fill="white"/>
    <rect x="152" y="560" width="310" height="150" rx="24" fill="white"/>
    <rect x="738" y="560" width="310" height="150" rx="24" fill="white"/>
  </g>

  <text x="474" y="348" class="center-title">Dohoda, ne diktát</text>
  <text x="468" y="392" class="center-copy">Krátká, konkrétní,</text>
  <text x="457" y="420" class="center-copy">psaná a obnovovaná</text>
  <text x="486" y="448" class="center-copy">společně</text>

  <text x="118" y="194" class="box-title">1. Pravidla pro všechny</text>
  <text x="118" y="228" class="box-copy">Jídlo bez telefonů, noční nabíjení</text>
  <text x="118" y="252" class="box-copy">mimo ložnici, stejný metr i na rodiče</text>

  <text x="832" y="194" class="box-title">2. Bezpečnost AI</text>
  <text x="832" y="228" class="box-copy">AI na učení ano, AI „kamarádství“ ne.</text>
  <text x="832" y="252" class="box-copy">Žádné svěřování intimních detailů</text>

  <text x="102" y="372" class="box-title">3. Fotky a soukromí</text>
  <text x="102" y="406" class="box-copy">Bez souhlasu nenahrávat cizí fotky.</text>
  <text x="102" y="430" class="box-copy">Žádné fake nudes, deepfakes, klon hlasu</text>

  <text x="848" y="372" class="box-title">4. Důsledky a obnova</text>
  <text x="848" y="406" class="box-copy">Co se stane poprvé, podruhé, opakovaně.</text>
  <text x="848" y="430" class="box-copy">Nejen trest, ale návrat k důvěře</text>

  <text x="182" y="604" class="box-title">5. Právo dítěte rozumět pravidlům</text>
  <text x="182" y="638" class="box-copy">Nejen „protože jsem řekl“, ale jasné proč.</text>
  <text x="182" y="662" class="box-copy">Možnost požádat o změnu rozhovorem</text>

  <text x="768" y="604" class="box-title">6. Revize každých pár měsíců</text>
  <text x="768" y="638" class="box-copy">Dohoda není věčná, ale nemění se v afektu.</text>
  <text x="768" y="662" class="box-copy">Roste s věkem, ne s tlakem dítěte</text>

  <text x="72" y="780" class="source">Praktická zkratka: dobrá dohoda chrání vztah i hranice zároveň.</text>
</svg>

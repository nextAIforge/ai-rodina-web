<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="0" y="0" width="1200" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#2D3436" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#5B7B6A"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#B85C5C"/>
    </marker>
    <style>
      .title { font: 700 42px Georgia, serif; fill: #2D3436; }
      .subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #4A5568; }
      .lane-title { font: 700 26px Georgia, serif; }
      .box-title { font: 700 18px Georgia, serif; fill: #2D3436; }
      .box-copy { font: 400 16px Arial, Helvetica, sans-serif; fill: #4A5568; }
      .footer { font: 700 22px Georgia, serif; fill: #2D3436; }
      .footer-copy { font: 400 17px Arial, Helvetica, sans-serif; fill: #4A5568; }
    </style>
  </defs>

  <rect width="1200" height="820" rx="36" fill="#FAF8F5"/>
  <text x="72" y="84" class="title">AI je tutor, ne autor</text>
  <text x="72" y="120" class="subtitle">Rozhodující není, jestli dítě AI použilo. Rozhodující je, co s ní dělalo.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="172" width="1056" height="250" rx="28" fill="white"/>
    <rect x="72" y="454" width="1056" height="250" rx="28" fill="white"/>
  </g>

  <text x="104" y="216" class="lane-title" fill="#3D5A4A">Zdravá cesta: pomoc k porozumění</text>
  <text x="104" y="498" class="lane-title" fill="#8B4444">Riziková cesta: hotový výkon bez porozumění</text>

  <g>
    <rect x="104" y="250" width="200" height="112" rx="22" fill="#EDF5F0"/>
    <rect x="356" y="250" width="200" height="112" rx="22" fill="#EDF5F0"/>
    <rect x="608" y="250" width="200" height="112" rx="22" fill="#EDF5F0"/>
    <rect x="860" y="250" width="200" height="112" rx="22" fill="#EDF5F0"/>
    <line x1="304" y1="306" x2="356" y2="306" stroke="#5B7B6A" stroke-width="5" marker-end="url(#arrowGreen)"/>
    <line x1="556" y1="306" x2="608" y2="306" stroke="#5B7B6A" stroke-width="5" marker-end="url(#arrowGreen)"/>
    <line x1="808" y1="306" x2="860" y2="306" stroke="#5B7B6A" stroke-width="5" marker-end="url(#arrowGreen)"/>

    <text x="134" y="292" class="box-title">1. Zadání</text>
    <text x="134" y="322" class="box-copy">Dítě přinese</text>
    <text x="134" y="346" class="box-copy">konkrétní problém</text>

    <text x="386" y="292" class="box-title">2. Ptám se AI</text>
    <text x="386" y="322" class="box-copy">Vysvětli princip,</text>
    <text x="386" y="346" class="box-copy">dej příklad, ptej se mě</text>

    <text x="638" y="292" class="box-title">3. Přemýšlím</text>
    <text x="638" y="322" class="box-copy">Dítě vysvětlí</text>
    <text x="638" y="346" class="box-copy">vlastními slovy</text>

    <text x="890" y="292" class="box-title">4. Odevzdám svoje</text>
    <text x="890" y="322" class="box-copy">AI pomohla pochopit,</text>
    <text x="890" y="346" class="box-copy">ale nepsala za dítě</text>
  </g>

  <g>
    <rect x="104" y="532" width="200" height="112" rx="22" fill="#F5E8E8"/>
    <rect x="356" y="532" width="200" height="112" rx="22" fill="#F5E8E8"/>
    <rect x="608" y="532" width="200" height="112" rx="22" fill="#F5E8E8"/>
    <rect x="860" y="532" width="200" height="112" rx="22" fill="#F5E8E8"/>
    <line x1="304" y1="588" x2="356" y2="588" stroke="#B85C5C" stroke-width="5" marker-end="url(#arrowRed)"/>
    <line x1="556" y1="588" x2="608" y2="588" stroke="#B85C5C" stroke-width="5" marker-end="url(#arrowRed)"/>
    <line x1="808" y1="588" x2="860" y2="588" stroke="#B85C5C" stroke-width="5" marker-end="url(#arrowRed)"/>

    <text x="134" y="574" class="box-title">1. Zadání</text>
    <text x="134" y="604" class="box-copy">Dítě vloží celé</text>
    <text x="134" y="628" class="box-copy">zadání bez práce</text>

    <text x="386" y="574" class="box-title">2. AI napíše vše</text>
    <text x="386" y="604" class="box-copy">Hotový text,</text>
    <text x="386" y="628" class="box-copy">hotové řešení</text>

    <text x="638" y="574" class="box-title">3. Dítě nerozumí</text>
    <text x="638" y="604" class="box-copy">Neumí vysvětlit,</text>
    <text x="638" y="628" class="box-copy">co odevzdalo</text>

    <text x="890" y="574" class="box-title">4. Podvádění</text>
    <text x="890" y="604" class="box-copy">Vypadá chytře,</text>
    <text x="890" y="628" class="box-copy">ale nic nevybudovalo</text>
  </g>

  <text x="72" y="764" class="footer">Pravidlo pro rodinu: AI může pomoci myslet. Nesmí převzít odpovědnost.</text>
</svg>

<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="0" y="0" width="1200" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#2D3436" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 42px Georgia, serif; fill: #2D3436; }
      .subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #4A5568; }
      .center-title { font: 700 30px Georgia, serif; fill: white; }
      .center-copy { font: 400 19px Arial, Helvetica, sans-serif; fill: rgba(255,255,255,0.86); }
      .box-title { font: 700 22px Georgia, serif; fill: #2D3436; }
      .box-copy { font: 400 17px Arial, Helvetica, sans-serif; fill: #4A5568; }
      .source { font: 400 15px Arial, Helvetica, sans-serif; fill: #7A7A7A; }
    </style>
  </defs>

  <rect width="1200" height="820" rx="36" fill="#FAF8F5"/>
  <text x="72" y="86" class="title">Co všechno telefon ví o dítěti</text>
  <text x="72" y="122" class="subtitle">Telefon nesbírá jen obsah. Skládá mapu života, rytmu dne, vztahů i zranitelných míst.</text>

  <g stroke="#D9D1C6" stroke-width="4">
    <line x1="600" y1="390" x2="290" y2="230"/>
    <line x1="600" y1="390" x2="900" y2="230"/>
    <line x1="600" y1="390" x2="250" y2="410"/>
    <line x1="600" y1="390" x2="950" y2="410"/>
    <line x1="600" y1="390" x2="360" y2="620"/>
    <line x1="600" y1="390" x2="840" y2="620"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="272" width="360" height="236" rx="34" fill="#5B7B6A"/>
    <rect x="108" y="146" width="286" height="148" rx="24" fill="white"/>
    <rect x="806" y="146" width="286" height="148" rx="24" fill="white"/>
    <rect x="72" y="338" width="286" height="148" rx="24" fill="white"/>
    <rect x="842" y="338" width="286" height="148" rx="24" fill="white"/>
    <rect x="166" y="556" width="286" height="148" rx="24" fill="white"/>
    <rect x="748" y="556" width="286" height="148" rx="24" fill="white"/>
  </g>

  <text x="493" y="336" class="center-title">Telefon vidí víc,</text>
  <text x="477" y="374" class="center-title">než rodič tuší</text>
  <text x="486" y="420" class="center-copy">Vyhledávání, kliknutí,</text>
  <text x="497" y="448" class="center-copy">čas, poloha, vztahy,</text>
  <text x="514" y="476" class="center-copy">náhlé změny chování</text>

  <text x="136" y="188" class="box-title">Lokace</text>
  <text x="136" y="222" class="box-copy">Kde bývá, kam chodí,</text>
  <text x="136" y="246" class="box-copy">u koho spí, kde je samo</text>

  <text x="834" y="188" class="box-title">Čas</text>
  <text x="834" y="222" class="box-copy">Kdy usíná, kdy se budí,</text>
  <text x="834" y="246" class="box-copy">kdy je nejzranitelnější</text>

  <text x="100" y="380" class="box-title">Emoce</text>
  <text x="100" y="414" class="box-copy">Smutek, úzkost, útěk</text>
  <text x="100" y="438" class="box-copy">do obrazovky místo k lidem</text>

  <text x="870" y="380" class="box-title">Vztahy</text>
  <text x="870" y="414" class="box-copy">Nejbližší lidé, tajné kontakty,</text>
  <text x="870" y="438" class="box-copy">online vztah bez osobního setkání</text>

  <text x="194" y="598" class="box-title">Úniky</text>
  <text x="194" y="632" class="box-copy">Co dítě dělá, když je mu zle:</text>
  <text x="194" y="656" class="box-copy">scroll, hry, AI chat, hudba</text>

  <text x="776" y="598" class="box-title">Zranitelnost</text>
  <text x="776" y="632" class="box-copy">Kdy je nejsnazší ho udržet,</text>
  <text x="776" y="656" class="box-copy">ovlivnit nebo zahanbit</text>

  <text x="72" y="774" class="source">Shrnutí pro rodiče: telefon nesleduje jen obsah. Skládá přesný obraz každodenního života dítěte.</text>
</svg>
